<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid/Network Icon -->
  <g transform="translate(5, 10)">
    <!-- Network nodes -->
    <circle cx="10" cy="10" r="3" fill="#8CC63F"/>
    <circle cx="30" cy="10" r="3" fill="#8CC63F"/>
    <circle cx="20" cy="25" r="3" fill="#8CC63F"/>
    <circle cx="10" cy="40" r="3" fill="#8CC63F"/>
    <circle cx="30" cy="40" r="3" fill="#8CC63F"/>
    
    <!-- Network connections -->
    <line x1="10" y1="10" x2="30" y2="10" stroke="#003D6A" stroke-width="2"/>
    <line x1="10" y1="10" x2="20" y2="25" stroke="#003D6A" stroke-width="2"/>
    <line x1="30" y1="10" x2="20" y2="25" stroke="#003D6A" stroke-width="2"/>
    <line x1="20" y1="25" x2="10" y2="40" stroke="#003D6A" stroke-width="2"/>
    <line x1="20" y1="25" x2="30" y2="40" stroke="#003D6A" stroke-width="2"/>
    <line x1="10" y1="40" x2="30" y2="40" stroke="#003D6A" stroke-width="2"/>
  </g>
  
  <!-- AlphaGrid Text -->
  <text x="50" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#003D6A">
    AlphaGrid
  </text>
  <text x="50" y="45" font-family="Arial, sans-serif" font-size="10" fill="#666">
    ELECTROTECHNICAL SOLUTIONS
  </text>
</svg>

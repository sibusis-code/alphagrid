<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Battery Cabinet -->
  <g transform="translate(80, 40)">
    <!-- Main cabinet -->
    <rect width="240" height="220" fill="#e0e0e0" stroke="#003D6A" stroke-width="3" rx="4"/>
    
    <!-- Front panel -->
    <rect x="10" y="10" width="220" height="200" fill="#f5f5f5" stroke="#666" stroke-width="1" rx="2"/>
    
    <!-- Brand label -->
    <rect x="20" y="20" width="200" height="30" fill="#003D6A" rx="2"/>
    <text x="120" y="40" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">
      NARADA 48V 100Ah
    </text>
    
    <!-- Battery indicator -->
    <g transform="translate(30, 65)">
      <rect width="180" height="80" fill="#003D6A" rx="3"/>
      
      <!-- Battery cells representation -->
      <rect x="10" y="10" width="35" height="60" fill="#8CC63F" rx="2"/>
      <rect x="50" y="10" width="35" height="60" fill="#8CC63F" rx="2"/>
      <rect x="90" y="10" width="35" height="60" fill="#8CC63F" rx="2"/>
      <rect x="130" y="10" width="35" height="60" fill="#8CC63F" rx="2"/>
      
      <!-- Plus/minus terminals -->
      <text x="27.5" y="25" font-family="Arial" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">+</text>
      <text x="147.5" y="25" font-family="Arial" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">-</text>
    </g>
    
    <!-- Status display -->
    <g transform="translate(30, 160)">
      <rect width="180" height="40" fill="#1a1a1a" rx="2"/>
      
      <!-- LED indicators -->
      <text x="10" y="15" font-family="Arial" font-size="10" fill="#00FF00">CHARGE</text>
      <circle cx="60" cy="12" r="4" fill="#00FF00"/>
      
      <text x="85" y="15" font-family="Arial" font-size="10" fill="#00FF00">READY</text>
      <circle cx="130" cy="12" r="4" fill="#00FF00"/>
      
      <text x="10" y="32" font-family="Arial" font-size="10" fill="#8CC63F">48V</text>
      <text x="60" y="32" font-family="Arial" font-size="10" fill="#8CC63F">100%</text>
      <text x="110" y="32" font-family="Arial" font-size="10" fill="#8CC63F">25°C</text>
    </g>
  </g>
  
  <!-- Power lines illustration -->
  <g opacity="0.3">
    <path d="M 320,150 L 370,100" stroke="#FFA500" stroke-width="3"/>
    <path d="M 320,150 L 370,200" stroke="#FFA500" stroke-width="3"/>
    <circle cx="370" cy="100" r="5" fill="#FFA500"/>
    <circle cx="370" cy="200" r="5" fill="#FFA500"/>
  </g>
</svg>

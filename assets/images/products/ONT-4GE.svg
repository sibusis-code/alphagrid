<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- ONT Device -->
  <g transform="translate(100, 80)">
    <!-- Main body -->
    <rect width="200" height="80" fill="#ffffff" stroke="#003D6A" stroke-width="2" rx="4"/>
    
    <!-- Top panel -->
    <rect x="5" y="5" width="190" height="30" fill="#003D6A" rx="2"/>
    <text x="100" y="24" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">
      ONT 4GE + WiFi
    </text>
    
    <!-- Ports section -->
    <g transform="translate(10, 45)">
      <!-- Ethernet ports -->
      <rect x="0" y="0" width="15" height="20" fill="#8CC63F" rx="1"/>
      <text x="7.5" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">GE1</text>
      
      <rect x="20" y="0" width="15" height="20" fill="#8CC63F" rx="1"/>
      <text x="27.5" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">GE2</text>
      
      <rect x="40" y="0" width="15" height="20" fill="#8CC63F" rx="1"/>
      <text x="47.5" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">GE3</text>
      
      <rect x="60" y="0" width="15" height="20" fill="#8CC63F" rx="1"/>
      <text x="67.5" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">GE4</text>
      
      <!-- PON port -->
      <rect x="95" y="0" width="15" height="20" fill="#4A90E2" rx="1"/>
      <text x="102.5" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">PON</text>
      
      <!-- Power -->
      <circle cx="135" cy="10" r="6" fill="#FFA500"/>
      <text x="135" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">PWR</text>
      
      <!-- WiFi indicator -->
      <g transform="translate(155, 5)">
        <path d="M 10,15 Q 10,10 15,10 Q 20,10 20,15" stroke="#003D6A" stroke-width="1.5" fill="none"/>
        <path d="M 12,15 Q 12,12 15,12 Q 18,12 18,15" stroke="#003D6A" stroke-width="1.5" fill="none"/>
        <circle cx="15" cy="15" r="1.5" fill="#003D6A"/>
      </g>
      <text x="170" y="26" font-family="Arial" font-size="6" fill="#666" text-anchor="middle">WiFi</text>
    </g>
  </g>
  
  <!-- Fiber optic cable illustration -->
  <g transform="translate(50, 200)">
    <line x1="0" y1="20" x2="100" y2="0" stroke="#8CC63F" stroke-width="3"/>
    <circle cx="100" cy="0" r="4" fill="#8CC63F"/>
    <text x="50" y="40" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Fiber Connection</text>
  </g>
</svg>

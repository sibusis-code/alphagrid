<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="deviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- GPON OLT Device -->
  <g transform="translate(50, 80)">
    <!-- Main chassis -->
    <rect width="300" height="140" fill="url(#deviceGrad)" stroke="#003D6A" stroke-width="2" rx="4"/>
    
    <!-- Front panel -->
    <rect x="10" y="10" width="280" height="120" fill="#1a1a1a" rx="2"/>
    
    <!-- Port banks -->
    <g transform="translate(20, 25)">
      <!-- PON ports (green) -->
      <rect x="0" y="0" width="100" height="35" fill="#003D6A" rx="2"/>
      <text x="50" y="15" font-family="Arial" font-size="10" fill="#8CC63F" text-anchor="middle">PON PORTS</text>
      <circle cx="20" cy="25" r="4" fill="#8CC63F"/>
      <circle cx="40" cy="25" r="4" fill="#8CC63F"/>
      <circle cx="60" cy="25" r="4" fill="#8CC63F"/>
      <circle cx="80" cy="25" r="4" fill="#8CC63F"/>
      
      <!-- Uplink ports (blue) -->
      <rect x="110" y="0" width="70" height="35" fill="#003D6A" rx="2"/>
      <text x="145" y="15" font-family="Arial" font-size="10" fill="#4A90E2" text-anchor="middle">UPLINK</text>
      <rect x="120" y="20" width="15" height="10" fill="#4A90E2" rx="1"/>
      <rect x="140" y="20" width="15" height="10" fill="#4A90E2" rx="1"/>
      
      <!-- Management -->
      <rect x="190" y="0" width="70" height="35" fill="#003D6A" rx="2"/>
      <text x="225" y="20" font-family="Arial" font-size="10" fill="#FFA500" text-anchor="middle">MGMT</text>
      <circle cx="215" cy="27" r="3" fill="#FFA500"/>
      <circle cx="235" cy="27" r="3" fill="#FFA500"/>
    </g>
    
    <!-- Status LEDs -->
    <g transform="translate(20, 75)">
      <text x="0" y="10" font-family="Arial" font-size="8" fill="#8CC63F">STATUS</text>
      <circle cx="50" cy="7" r="3" fill="#00FF00"/>
      <circle cx="65" cy="7" r="3" fill="#00FF00"/>
      <circle cx="80" cy="7" r="3" fill="#FFA500"/>
    </g>
    
    <!-- Model label -->
    <text x="150" y="130" font-family="Arial" font-size="12" fill="#003D6A" text-anchor="middle" font-weight="bold">
      GPON OLT 16-Port
    </text>
  </g>
  
  <!-- Fiber connections illustration -->
  <g opacity="0.3">
    <path d="M 150,100 Q 100,50 50,20" stroke="#8CC63F" stroke-width="2" fill="none"/>
    <path d="M 250,100 Q 300,50 350,20" stroke="#8CC63F" stroke-width="2" fill="none"/>
  </g>
</svg>

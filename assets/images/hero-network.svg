<svg width="1920" height="600" viewBox="0 0 1920 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001F3F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D6A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8CC63F;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8CC63F;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="1920" height="600" fill="url(#bgGradient)"/>
  
  <!-- Network grid pattern -->
  <g opacity="0.3">
    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="1920" y2="100" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="0" y1="200" x2="1920" y2="200" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="0" y1="300" x2="1920" y2="300" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="0" y1="400" x2="1920" y2="400" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="0" y1="500" x2="1920" y2="500" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- Vertical lines -->
    <line x1="384" y1="0" x2="384" y2="600" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="768" y1="0" x2="768" y2="600" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="1152" y1="0" x2="1152" y2="600" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="1536" y1="0" x2="1536" y2="600" stroke="#8CC63F" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Network nodes and connections -->
  <g opacity="0.6">
    <!-- Node clusters -->
    <circle cx="300" cy="150" r="40" fill="url(#nodeGlow)"/>
    <circle cx="300" cy="150" r="8" fill="#8CC63F"/>
    
    <circle cx="600" cy="250" r="40" fill="url(#nodeGlow)"/>
    <circle cx="600" cy="250" r="8" fill="#8CC63F"/>
    
    <circle cx="900" cy="180" r="40" fill="url(#nodeGlow)"/>
    <circle cx="900" cy="180" r="8" fill="#8CC63F"/>
    
    <circle cx="1200" cy="300" r="40" fill="url(#nodeGlow)"/>
    <circle cx="1200" cy="300" r="8" fill="#8CC63F"/>
    
    <circle cx="1500" cy="200" r="40" fill="url(#nodeGlow)"/>
    <circle cx="1500" cy="200" r="8" fill="#8CC63F"/>
    
    <circle cx="450" cy="400" r="40" fill="url(#nodeGlow)"/>
    <circle cx="450" cy="400" r="8" fill="#8CC63F"/>
    
    <circle cx="1050" cy="450" r="40" fill="url(#nodeGlow)"/>
    <circle cx="1050" cy="450" r="8" fill="#8CC63F"/>
    
    <!-- Connections -->
    <line x1="300" y1="150" x2="600" y2="250" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="600" y1="250" x2="900" y2="180" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="900" y1="180" x2="1200" y2="300" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="1200" y1="300" x2="1500" y2="200" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="300" y1="150" x2="450" y2="400" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="600" y1="250" x2="450" y2="400" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="900" y1="180" x2="1050" y2="450" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
    <line x1="1200" y1="300" x2="1050" y2="450" stroke="#8CC63F" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Fiber optic lines -->
  <g opacity="0.4">
    <path d="M 0,300 Q 480,280 960,320 T 1920,300" stroke="#8CC63F" stroke-width="3" fill="none"/>
    <path d="M 0,350 Q 480,370 960,330 T 1920,350" stroke="#6AB82E" stroke-width="2" fill="none"/>
  </g>
</svg>
